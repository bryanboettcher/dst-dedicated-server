<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DST Server</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Don't Starve Together</h1>
      <div id="connection-status" class="badge badge-connecting">connecting</div>
    </header>

    <div class="layout">
      <div class="col-primary">
        <section id="shards"></section>

        <section class="cluster-panel">
          <div class="section-heading">Cluster</div>
          <div class="action-row">
            <button class="btn btn-primary" onclick="clusterAction('save')">Save</button>
            <button class="btn btn-secondary" onclick="syncPlayers()">Sync Players</button>
          </div>

          <div class="section-heading">World</div>
          <div class="action-row">
            <button class="btn btn-secondary" onclick="clusterRollback()">Rollback</button>
            <input type="number" id="rollback-days" min="0" max="100"
                   placeholder="days" class="input-inline">
          </div>
          <div class="action-row">
            <button class="btn btn-secondary" onclick="clusterCommand('c_skip(1)')">Skip Day</button>
          </div>

          <div class="section-heading">Announce</div>
          <div class="announce-row">
            <input type="text" id="announce-input" placeholder="Message to all players"
                   onkeydown="if(event.key==='Enter')announceAll()">
            <button class="btn btn-primary" onclick="announceAll()">Announce</button>
          </div>

          <div class="section-heading section-heading-danger">Danger</div>
          <div class="action-row">
            <button class="btn btn-danger" onclick="confirmClusterAction('shutdown')">Shutdown Cluster</button>
          </div>
          <div class="action-row">
            <button class="btn btn-danger" onclick="confirmClusterCommand('c_regenerateworld()', 'regenerate the world')">Regenerate World</button>
          </div>
        </section>

        <section class="console">
          <div class="section-heading">Console</div>
          <div class="console-input-row">
            <select id="console-shard"></select>
            <input type="text" id="console-input" placeholder='c_countprefabs("beefalo")'
                   onkeydown="if(event.key==='Enter')sendConsole()">
            <button class="btn btn-primary" onclick="sendConsole()">Send</button>
          </div>
          <div id="console-log"></div>
        </section>
      </div>

      <div class="col-logs">
        <section class="log-viewer">
          <div class="log-viewer-header">
            <div class="section-heading">Server Logs</div>
            <div class="log-controls">
              <select id="log-shard" onchange="switchLogShard()"></select>
              <label class="toggle-label">
                <input type="checkbox" id="log-autoscroll" checked> Auto-scroll
              </label>
            </div>
          </div>
          <div id="log-output"></div>
        </section>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
